<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-title" content="Page Audit"/>
<title>Bobkay — Page Audit</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#0A0A0A; --surface:#111; --border:#1E1E1E; --input:#161616;
  --text:#F0EDE8; --muted:#666; --faint:#333;
  --orange:#FF6B35; --yellow:#FFD700; --teal:#00E5CC;
  --purple:#B388FF; --red:#FF4D6D; --green:#69FF8C;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
.screen{display:none;min-height:100vh}
.screen.active{display:block}

/* HOME */
.home-header{padding:36px 24px 0}
.eyebrow{font-size:10px;letter-spacing:3px;color:var(--faint);text-transform:uppercase;margin-bottom:8px}
.home-title{font-size:32px;font-family:'Playfair Display',serif;line-height:1.15;margin-bottom:8px}
.home-title span{color:var(--orange)}
.home-sub{font-size:13px;color:var(--muted);margin-bottom:32px}
.new-btn{width:100%;padding:17px;border-radius:14px;border:1.5px dashed var(--orange);background:rgba(255,107,53,0.07);color:var(--orange);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:32px}
.new-btn:active{background:rgba(255,107,53,0.18)}
.audits-label{font-size:10px;letter-spacing:2px;color:var(--faint);text-transform:uppercase;margin-bottom:14px}
.audits-list{padding:0 24px 80px}
.empty-state{text-align:center;padding:50px 0;color:var(--faint);font-size:14px;line-height:2}

/* CARD */
.audit-card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:12px;position:relative;overflow:hidden}
.card-bar{position:absolute;top:0;left:0;right:0;height:3px;background:var(--border)}
.card-bar-fill{height:100%;border-radius:2px;transition:width .3s}
.card-body{display:flex;justify-content:space-between;align-items:flex-start}
.card-info{flex:1;cursor:pointer}
.card-name{font-size:16px;font-weight:600;margin-bottom:2px}
.card-handle{font-size:12px;color:var(--muted);margin-bottom:8px}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.tag{font-size:11px;border-radius:20px;padding:3px 10px;border:1px solid}
.tag-niche{background:var(--input);border-color:#2A2A2A;color:var(--muted)}
.card-meta{font-size:11px;color:#2A2A2A;margin-top:10px}
.card-actions{display:flex;flex-direction:column;gap:8px;margin-left:12px}
.card-btn{padding:8px 14px;border-radius:8px;border:1px solid #2A2A2A;background:var(--input);color:#CCC;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.card-btn-del{background:transparent;color:var(--faint)}

/* AUDIT HEADER */
.audit-hdr{border-bottom:1px solid var(--border);padding:14px 20px;background:var(--bg);position:sticky;top:0;z-index:20;display:flex;justify-content:space-between;align-items:center}
.back-btn{background:none;border:none;color:var(--muted);font-size:22px;cursor:pointer;padding:0 10px 0 0;line-height:1}
.hdr-info{flex:1}
.hdr-name{font-size:15px;font-weight:600}
.hdr-handle{font-size:11px;color:var(--muted)}
.hdr-right{text-align:right}
.prog-lbl{font-size:11px;color:var(--faint);margin-bottom:5px}
.prog-bar{width:70px;height:3px;background:var(--border);border-radius:2px;overflow:hidden}
.prog-fill{height:100%;border-radius:2px;transition:width .3s}

/* BODY */
.audit-body{padding:20px 20px 40px;max-width:500px;margin:0 auto}

/* BRAND INFO */
.brand-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;margin-bottom:20px}
.field{margin-bottom:10px}
.field label{font-size:11px;color:var(--muted);display:block;margin-bottom:4px}
.field input,.field-ta{width:100%;background:var(--input);border:1px solid #252525;border-radius:8px;padding:10px 12px;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.field-ta{resize:vertical;line-height:1.6;font-size:13px}
.field input:focus,.field-ta:focus{border-color:#444}

/* PILLS */
.pills{display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none}
.pills::-webkit-scrollbar{display:none}
.pill{flex-shrink:0;padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--faint);font-size:11px;cursor:pointer;font-family:inherit;transition:all .15s}

/* SECTION CARD */
.sec-card{background:var(--surface);border-radius:16px;padding:20px;margin-bottom:20px;border:1px solid transparent}
.sec-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;font-weight:600}
.sec-sub{font-size:13px;color:var(--muted);margin-bottom:22px}
.question{margin-bottom:20px}
.q-text{font-size:13px;color:#CCC;margin-bottom:10px;line-height:1.5}

/* CONTROLS */
.yesno{display:flex;gap:8px}
.yn-btn,.choice-btn,.chip{cursor:pointer;font-family:inherit;transition:all .15s}
.yn-btn{padding:9px 22px;border-radius:8px;border:1px solid #252525;background:var(--input);color:var(--muted);font-size:13px}
.choices{display:flex;flex-direction:column;gap:6px}
.choice-btn{padding:11px 14px;border-radius:8px;border:1px solid #252525;background:var(--input);color:var(--muted);font-size:13px;text-align:left}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{padding:7px 13px;border-radius:20px;border:1px solid #252525;background:var(--input);color:var(--muted);font-size:12px}

/* NAV */
.nav-btns{display:flex;gap:10px;margin-bottom:24px}
.nav-back{flex:1;padding:14px;border-radius:11px;border:1px solid #252525;background:transparent;color:var(--muted);font-size:14px;cursor:pointer;font-family:inherit}
.nav-next{flex:2;padding:14px;border-radius:11px;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;color:#0A0A0A;transition:background .3s}

/* SUMMARY */
.summary-card{background:var(--surface);border:1px solid rgba(105,255,140,0.15);border-radius:14px;padding:18px;margin-bottom:16px}
.summary-eyebrow{font-size:10px;letter-spacing:2px;color:var(--green);text-transform:uppercase;margin-bottom:14px}
.s-row{margin-bottom:14px}
.s-lbl{font-size:11px;color:var(--muted);margin-bottom:4px}
.s-val{font-size:13px;color:#CCC;line-height:1.6;white-space:pre-wrap}
.s-brand{font-size:16px;color:var(--text);font-weight:600}

/* EXPORT */
.export-btn{width:100%;padding:15px;border-radius:11px;border:1px solid rgba(105,255,140,0.3);background:rgba(105,255,140,0.08);color:var(--green);font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;margin-bottom:30px;display:flex;align-items:center;justify-content:center;gap:8px}
.export-btn:active{background:rgba(105,255,140,0.18)}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.82);z-index:100;align-items:flex-end}
.modal-overlay.open{display:flex}
.modal{background:#141414;border-radius:18px 18px 0 0;padding:24px;width:100%}
.modal-title{font-size:16px;font-weight:600;margin-bottom:8px}
.modal-sub{font-size:13px;color:var(--muted);margin-bottom:22px}
.modal-btns{display:flex;gap:10px}
.modal-cancel{flex:1;padding:14px;border-radius:10px;border:1px solid #2A2A2A;background:transparent;color:var(--muted);font-size:14px;cursor:pointer;font-family:inherit}
.modal-confirm{flex:1;padding:14px;border-radius:10px;border:none;background:var(--red);color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen active" id="screen-home">
  <div class="home-header">
    <div class="eyebrow">Bobkay SMM</div>
    <div class="home-title" style="font-family:'Playfair Display',serif">Page Audit<br><span>Intelligence</span></div>
    <p class="home-sub">Your diagnosis tool for every brand you prospect</p>
    <button class="new-btn" id="new-audit-btn">
      <span style="font-size:22px;font-weight:300">+</span> Start New Audit
    </button>
  </div>
  <div class="audits-list">
    <div class="audits-label" id="audits-count" style="display:none"></div>
    <div id="audits-container">
      <div class="empty-state">No audits yet.<br>Start with a brand you want to pitch.</div>
    </div>
  </div>
</div>

<!-- AUDIT -->
<div class="screen" id="screen-audit">
  <div class="audit-hdr">
    <button class="back-btn" id="back-btn">←</button>
    <div class="hdr-info">
      <div class="hdr-name" id="hdr-name">New Audit</div>
      <div class="hdr-handle" id="hdr-handle"></div>
    </div>
    <div class="hdr-right">
      <div class="prog-lbl" id="hdr-prog">0% done</div>
      <div class="prog-bar"><div class="prog-fill" id="hdr-bar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="audit-body" id="audit-body"></div>
</div>

<!-- DELETE MODAL -->
<div class="modal-overlay" id="del-modal">
  <div class="modal">
    <div class="modal-title">Delete this audit?</div>
    <div class="modal-sub">This cannot be undone.</div>
    <div class="modal-btns">
      <button class="modal-cancel" id="modal-cancel">Cancel</button>
      <button class="modal-confirm" id="modal-confirm">Delete</button>
    </div>
  </div>
</div>

<script>
// ── SECTIONS DATA ──────────────────────────────────────────────────────────
const SECTIONS = [
  {id:"fi", label:"01 — First Impression", sub:"The 3-second test", color:"#FF6B35", qs:[
    {id:"fi1", text:"Is it instantly clear what they sell and who it's for?", type:"yn"},
    {id:"fi2", text:"Does the bio have a hook, offer, and CTA?", type:"yn"},
    {id:"fi3", text:"Does the grid look intentional or random?", type:"choice", opts:["Very intentional","Somewhat","Random"]},
    {id:"fi4", text:"First impression notes", type:"text"},
  ]},
  {id:"num", label:"02 — The Numbers", sub:"Ratios don't lie", color:"#FFD700", qs:[
    {id:"n1", text:"Followers", type:"input", ph:"e.g. 14,800"},
    {id:"n2", text:"Average Likes per post", type:"input", ph:"e.g. 120"},
    {id:"n3", text:"Average Comments per post", type:"input", ph:"e.g. 8"},
    {id:"n4", text:"Average Reel Views", type:"input", ph:"e.g. 1,500"},
    {id:"n5", text:"Engagement Rate (likes+comments ÷ followers × 100)", type:"input", ph:"Calculate and enter %"},
    {id:"n6", text:"Reel View Rate (views ÷ followers × 100)", type:"input", ph:"Calculate and enter %"},
    {id:"n7", text:"Engagement health", type:"choice", opts:["Strong (3%+)","Average (1–3%)","Weak (below 1%)"]},
  ]},
  {id:"con", label:"03 — Content Audit", sub:"What they post vs what works", color:"#00E5CC", qs:[
    {id:"ca1", text:"Content types used", type:"multi", opts:["Photos","Reels","Carousels","Stories","Lives"]},
    {id:"ca2", text:"What is their best performing post about?", type:"text"},
    {id:"ca3", text:"Why do you think it performed well?", type:"text"},
    {id:"ca4", text:"Content pillars missing", type:"multi", opts:["Educational","Behind the scenes","Transformations","Testimonials","Trending audio","Humor/Relatable","Product showcase"]},
    {id:"ca5", text:"Posting frequency", type:"choice", opts:["Daily","3–5x/week","1–2x/week","Inconsistent"]},
  ]},
  {id:"cap", label:"04 — Captions & CTAs", sub:"Voice, hooks, and conversion", color:"#B388FF", qs:[
    {id:"cap1", text:"Do captions open with a strong hook?", type:"yn"},
    {id:"cap2", text:"Is there brand personality and voice?", type:"yn"},
    {id:"cap3", text:"Do they include a clear CTA?", type:"yn"},
    {id:"cap4", text:"Are hashtags strategic or just dumped?", type:"choice", opts:["Strategic","Mixed","Just dumped"]},
    {id:"cap5", text:"Caption quality notes", type:"text"},
  ]},
  {id:"br", label:"05 — Brand Consistency", sub:"Does it all feel like one brand?", color:"#FF4D6D", qs:[
    {id:"br1", text:"Are colors and fonts consistent across posts?", type:"yn"},
    {id:"br2", text:"Does the Reels style match the grid?", type:"yn"},
    {id:"br3", text:"Is there visible social proof? (reviews, results highlight)", type:"yn"},
    {id:"br4", text:"Do Stories connect to the feed content?", type:"yn"},
    {id:"br5", text:"Brand consistency rating", type:"choice", opts:["Strong","Moderate","Weak"]},
  ]},
  {id:"opp", label:"06 — Your Opportunity", sub:"What you bring to the table", color:"#69FF8C", qs:[
    {id:"op1", text:"Top 3 problems you identified", type:"text"},
    {id:"op2", text:"What quick win could you deliver in 30 days?", type:"text"},
    {id:"op3", text:"Your pitch angle for this brand", type:"text"},
    {id:"op4", text:"Priority level for outreach", type:"choice", opts:["High — reach out now","Medium — research more","Low — not a fit yet"]},
  ]},
];

const PC = {"High — reach out now":"#69FF8C","Medium — research more":"#FFD700","Low — not a fit yet":"#FF4D6D"};
const STORE = "bobkay_v3";

// ── STATE ──────────────────────────────────────────────────────────────────
let audits = [];
let curId = null;
let curSec = 0;
let delTarget = null;

try { audits = JSON.parse(localStorage.getItem(STORE)||"[]"); } catch{}
function persist(){ localStorage.setItem(STORE, JSON.stringify(audits)); }
function getAudit(){ return audits.find(a=>a.id===curId); }

function totalQs(){ return SECTIONS.reduce((s,sec)=>s+sec.qs.length,0); }
function getProgress(ans){
  const filled = Object.values(ans).filter(v=>v&&(Array.isArray(v)?v.length>0:String(v).trim()!=="")).length;
  return Math.round((filled/totalQs())*100);
}

// ── SCREEN SWITCH ──────────────────────────────────────────────────────────
function show(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  window.scrollTo(0,0);
}

// ── HOME ───────────────────────────────────────────────────────────────────
function renderHome(){
  const c = document.getElementById("audits-container");
  const lbl = document.getElementById("audits-count");
  if(!audits.length){
    c.innerHTML='<div class="empty-state">No audits yet.<br>Start with a brand you want to pitch.</div>';
    lbl.style.display="none";
    return;
  }
  lbl.style.display="block";
  lbl.textContent=`Saved Audits (${audits.length})`;
  c.innerHTML=audits.map(a=>{
    const prog=getProgress(a.answers);
    const bc=prog===100?"#69FF8C":"#FF6B35";
    const pri=a.answers["op4"]||"";
    const pc=PC[pri]||"";
    return `<div class="audit-card">
      <div class="card-bar"><div class="card-bar-fill" style="width:${prog}%;background:${bc}"></div></div>
      <div class="card-body">
        <div class="card-info" data-open="${a.id}">
          <div class="card-name">${x(a.page.name)||"Unnamed Brand"}</div>
          ${a.page.handle?`<div class="card-handle">@${x(a.page.handle)}</div>`:""}
          <div class="card-tags">
            ${a.page.niche?`<span class="tag tag-niche">${x(a.page.niche)}</span>`:""}
            ${pri?`<span class="tag" style="background:${pc}18;border-color:${pc}40;color:${pc}">${pri.split("—")[0].trim()}</span>`:""}
            <span style="font-size:11px;color:#2A2A2A;padding:3px 0">${prog}% done</span>
          </div>
        </div>
        <div class="card-actions">
          <button class="card-btn" data-open="${a.id}">Open →</button>
          <button class="card-btn card-btn-del" data-del="${a.id}">Delete</button>
        </div>
      </div>
      <div class="card-meta">Created ${a.createdAt}</div>
    </div>`;
  }).join("");

  // events via delegation — no inline onclick
  c.querySelectorAll("[data-open]").forEach(el=>el.addEventListener("click",()=>openAudit(el.dataset.open)));
  c.querySelectorAll("[data-del]").forEach(el=>el.addEventListener("click",e=>{e.stopPropagation();askDel(el.dataset.del);}));
}

function createAudit(){
  const a={
    id:Date.now().toString(),
    createdAt:new Date().toLocaleDateString("en-NG",{day:"numeric",month:"short",year:"numeric"}),
    page:{name:"",handle:"",niche:""},
    answers:{}
  };
  audits.unshift(a);
  persist();
  openAudit(a.id);
}

// ── AUDIT ──────────────────────────────────────────────────────────────────
function openAudit(id){ curId=id; curSec=0; show("screen-audit"); renderAudit(); }

function updateHeader(){
  const a=getAudit();
  const prog=getProgress(a.answers);
  const sec=SECTIONS[curSec];
  const pc=prog===100?"#69FF8C":sec.color;
  document.getElementById("hdr-name").textContent=a.page.name||"New Audit";
  document.getElementById("hdr-handle").textContent=a.page.handle?"@"+a.page.handle:"";
  document.getElementById("hdr-prog").textContent=prog+"% done";
  const bar=document.getElementById("hdr-bar");
  bar.style.width=prog+"%";
  bar.style.background=pc;
}

// ── RENDER AUDIT (no full re-render on text input) ────────────────────────
function renderAudit(){
  const audit=getAudit();
  const sec=SECTIONS[curSec];
  updateHeader();
  const body=document.getElementById("audit-body");
  body.innerHTML="";

  // Brand info block (section 0 only)
  if(curSec===0){
    const box=document.createElement("div");
    box.className="brand-box";
    box.innerHTML=`<div class="eyebrow" style="color:var(--muted)">Brand Info</div>`;
    [{key:"name",label:"Brand Name",ph:"e.g. Dolché Beauty Ltd"},
     {key:"handle",label:"Instagram Handle",ph:"e.g. dolchebeautyltd"},
     {key:"niche",label:"Niche / Industry",ph:"e.g. Luxury Hair, Lagos"}
    ].forEach(({key,label,ph})=>{
      const f=document.createElement("div");
      f.className="field";
      const lbl=document.createElement("label");
      lbl.textContent=label;
      const inp=document.createElement("input");
      inp.value=audit.page[key]||"";
      inp.placeholder=ph;
      inp.addEventListener("input",()=>{
        audit.page[key]=inp.value;
        persist();
        document.getElementById("hdr-name").textContent=audit.page.name||"New Audit";
        document.getElementById("hdr-handle").textContent=audit.page.handle?"@"+audit.page.handle:"";
      });
      f.appendChild(lbl); f.appendChild(inp);
      box.appendChild(f);
    });
    body.appendChild(box);
  }

  // Pills
  const pillsDiv=document.createElement("div");
  pillsDiv.className="pills";
  SECTIONS.forEach((s,i)=>{
    const p=document.createElement("button");
    p.className="pill"+(i===curSec?" active":"");
    p.textContent="0"+(i+1);
    if(i===curSec){ p.style.borderColor=s.color; p.style.background=s.color+"20"; p.style.color=s.color; }
    p.addEventListener("click",()=>{ curSec=i; renderAudit(); window.scrollTo(0,0); });
    pillsDiv.appendChild(p);
  });
  body.appendChild(pillsDiv);

  // Section card
  const card=document.createElement("div");
  card.className="sec-card";
  card.style.borderColor=sec.color+"22";

  const secLbl=document.createElement("div");
  secLbl.className="sec-label";
  secLbl.style.color=sec.color;
  secLbl.textContent=sec.label;
  card.appendChild(secLbl);

  const secSub=document.createElement("div");
  secSub.className="sec-sub";
  secSub.textContent=sec.sub;
  card.appendChild(secSub);

  // Questions
  sec.qs.forEach(q=>{
    const qDiv=document.createElement("div");
    qDiv.className="question";
    const qText=document.createElement("div");
    qText.className="q-text";
    qText.textContent=q.text;
    qDiv.appendChild(qText);

    const val=audit.answers[q.id];

    if(q.type==="yn"){
      const row=document.createElement("div");
      row.className="yesno";
      ["Yes","No"].forEach(opt=>{
        const btn=document.createElement("button");
        btn.className="yn-btn";
        btn.textContent=opt;
        if(val===opt){ btn.style.borderColor=sec.color; btn.style.background=sec.color+"25"; btn.style.color=sec.color; }
        btn.addEventListener("click",()=>{ audit.answers[q.id]=opt; persist(); updateHeader(); rerenderButtons(sec,audit); });
        row.appendChild(btn);
      });
      qDiv.appendChild(row);

    } else if(q.type==="choice"){
      const col=document.createElement("div");
      col.className="choices";
      q.opts.forEach(opt=>{
        const btn=document.createElement("button");
        btn.className="choice-btn";
        btn.textContent=opt;
        if(val===opt){ btn.style.borderColor=sec.color; btn.style.background=sec.color+"20"; btn.style.color=sec.color; }
        btn.addEventListener("click",()=>{ audit.answers[q.id]=opt; persist(); updateHeader(); rerenderButtons(sec,audit); });
        col.appendChild(btn);
      });
      qDiv.appendChild(col);

    } else if(q.type==="multi"){
      const chips=document.createElement("div");
      chips.className="chips";
      const arr=Array.isArray(val)?val:[];
      q.opts.forEach(opt=>{
        const btn=document.createElement("button");
        btn.className="chip";
        const sel=arr.includes(opt);
        btn.textContent=(sel?"✓ ":"")+opt;
        if(sel){ btn.style.borderColor=sec.color; btn.style.background=sec.color+"20"; btn.style.color=sec.color; }
        btn.addEventListener("click",()=>{
          const cur=Array.isArray(audit.answers[q.id])?audit.answers[q.id]:[];
          audit.answers[q.id]=cur.includes(opt)?cur.filter(v=>v!==opt):[...cur,opt];
          persist(); updateHeader(); rerenderButtons(sec,audit);
        });
        chips.appendChild(btn);
      });
      qDiv.appendChild(chips);

    } else {
      // TEXT / INPUT — use textarea, NO re-render on change
      const ta=document.createElement("textarea");
      ta.className="field-ta";
      ta.rows=q.type==="input"?1:3;
      ta.placeholder=q.ph||"Type your notes here...";
      ta.value=val||"";
      ta.addEventListener("input",()=>{
        audit.answers[q.id]=ta.value;
        persist();
        updateHeader(); // just header, no full re-render
      });
      qDiv.appendChild(ta);
    }

    card.appendChild(qDiv);
  });
  body.appendChild(card);

  // Nav
  const nav=document.createElement("div");
  nav.className="nav-btns";
  if(curSec>0){
    const back=document.createElement("button");
    back.className="nav-back";
    back.textContent="← Back";
    back.addEventListener("click",()=>{ curSec--; renderAudit(); window.scrollTo(0,0); });
    nav.appendChild(back);
  }
  const next=document.createElement("button");
  next.className="nav-next";
  next.style.background=sec.color;
  const isLast=curSec===SECTIONS.length-1;
  next.textContent=isLast?"Mark Complete ✓":"Next Section →";
  next.addEventListener("click",()=>{
    if(isLast){
      next.textContent="✓ All Saved!";
      next.style.background="#69FF8C";
      setTimeout(()=>{ next.textContent="Mark Complete ✓"; next.style.background=sec.color; },2000);
    } else { curSec++; renderAudit(); window.scrollTo(0,0); }
  });
  nav.appendChild(next);
  body.appendChild(nav);

  // Summary + export (last section)
  if(isLast){ renderSummary(body, audit); }
}

// Re-render only the button states (not text inputs) after a tap
function rerenderButtons(sec, audit){
  // Just re-call renderAudit — safe because no text inputs lose focus
  // (text areas save onInput before any button tap triggers this)
  renderAudit();
}

function renderSummary(body, audit){
  const a=audit.answers;
  const hasData=a["op1"]||a["op2"]||a["op3"]||a["op4"];
  if(!hasData) return;

  const card=document.createElement("div");
  card.className="summary-card";
  card.innerHTML=`<div class="summary-eyebrow">Audit Summary</div>`;

  const addRow=(lbl,val,cls)=>{
    if(!val) return;
    const r=document.createElement("div");
    r.className="s-row";
    r.innerHTML=`<div class="s-lbl">${lbl}</div><div class="${cls||"s-val"}">${x(val)}</div>`;
    card.appendChild(r);
  };

  const brandLine=(audit.page.name||"—")+(audit.page.handle?" (@"+audit.page.handle+")":"");
  addRow("Brand",brandLine,"s-brand");
  addRow("Problems Identified",a["op1"]);
  addRow("Quick Win (30 days)",a["op2"]);
  addRow("Pitch Angle",a["op3"]);
  if(a["op4"]){
    const r=document.createElement("div");
    r.className="s-row";
    r.innerHTML=`<div class="s-lbl">Priority</div><div class="s-val" style="color:${PC[a["op4"]]||"#CCC"}">${x(a["op4"])}</div>`;
    card.appendChild(r);
  }
  body.appendChild(card);

  const expBtn=document.createElement("button");
  expBtn.className="export-btn";
  expBtn.innerHTML="📄 Export as PDF / Share";
  expBtn.addEventListener("click",()=>exportPDF(audit));
  body.appendChild(expBtn);
}

// ── EXPORT PDF ─────────────────────────────────────────────────────────────
function exportPDF(audit){
  const a=audit.answers;
  const date=new Date().toLocaleDateString("en-NG",{day:"numeric",month:"long",year:"numeric"});
  const rows=SECTIONS.map(sec=>{
    const qr=sec.qs.map(q=>{
      const v=a[q.id];
      if(!v||(Array.isArray(v)&&v.length===0)) return "";
      const d=Array.isArray(v)?v.join(", "):v;
      return `<tr><td style="padding:6px 10px 6px 0;color:#888;font-size:12px;vertical-align:top;width:42%">${q.text}</td><td style="padding:6px 0;font-size:13px;color:#111;vertical-align:top">${d}</td></tr>`;
    }).filter(Boolean).join("");
    if(!qr) return "";
    return `<div style="margin-bottom:24px">
      <div style="font-size:10px;letter-spacing:2px;text-transform:uppercase;color:${sec.color};font-weight:700;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #eee">${sec.label}</div>
      <table style="width:100%;border-collapse:collapse">${qr}</table></div>`;
  }).filter(Boolean).join("");

  const pri=a["op4"]||"";
  const pc=PC[pri]||"#888";
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"/>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
    <style>body{font-family:'DM Sans',sans-serif;background:#fff;color:#111;margin:0;padding:0}@media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}}</style>
  </head><body><div style="max-width:680px;margin:0 auto;padding:40px 32px">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:32px;padding-bottom:20px;border-bottom:2px solid #111">
      <div>
        <div style="font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#aaa;margin-bottom:6px">SMM Page Audit — Bobkay</div>
        <div style="font-family:'Playfair Display',serif;font-size:28px;font-weight:700;line-height:1.2">${audit.page.name||"Unnamed Brand"}</div>
        ${audit.page.handle?`<div style="font-size:13px;color:#888;margin-top:4px">@${audit.page.handle}</div>`:""}
        ${audit.page.niche?`<div style="display:inline-block;margin-top:8px;font-size:11px;background:#f5f5f5;border-radius:20px;padding:3px 12px;color:#666">${audit.page.niche}</div>`:""}
      </div>
      <div style="text-align:right">
        ${pri?`<div style="font-size:11px;background:${pc}18;border:1px solid ${pc}50;border-radius:20px;padding:5px 14px;color:${pc};font-weight:600;margin-bottom:6px">${pri.split("—")[0].trim()}</div>`:""}
        <div style="font-size:11px;color:#aaa">${date}</div>
      </div>
    </div>
    ${rows}
    <div style="margin-top:32px;padding-top:16px;border-top:1px solid #eee;font-size:11px;color:#ccc;text-align:center">Produced by Bobkay SMM Page Audit Tool</div>
  </div></body></html>`;

  const w=window.open("","_blank");
  if(w){ w.document.write(html); w.document.close(); w.onload=()=>{ w.focus(); w.print(); }; }
}

// ── DELETE ─────────────────────────────────────────────────────────────────
function askDel(id){ delTarget=id; document.getElementById("del-modal").classList.add("open"); }
function closeModal(){ document.getElementById("del-modal").classList.remove("open"); delTarget=null; }
function confirmDel(){ if(delTarget){ audits=audits.filter(a=>a.id!==delTarget); persist(); closeModal(); renderHome(); } }

// ── HELPERS ────────────────────────────────────────────────────────────────
function x(s){ if(!s)return""; return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }

// ── INIT ───────────────────────────────────────────────────────────────────
document.getElementById("new-audit-btn").addEventListener("click", createAudit);
document.getElementById("back-btn").addEventListener("click", ()=>{ show("screen-home"); renderHome(); });
document.getElementById("modal-cancel").addEventListener("click", closeModal);
document.getElementById("modal-confirm").addEventListener("click", confirmDel);

renderHome();

// ── SERVICE WORKER (full offline) ─────────────────────────────────────────
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("/page-audit/sw.js").catch(()=>{});
}
</script>
